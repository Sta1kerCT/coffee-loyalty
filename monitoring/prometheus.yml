global:
  scrape_interval: 15s

scrape_configs:
  - job_name: 'coffee-loyalty'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['app:8080']
    # В Docker на Mac используйте host.docker.internal; в Linux укажите IP хоста или имя сервиса app:8080
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
