apiVersion: apps/v1
kind: Deployment
metadata:
  name: coffee-loyalty
  labels:
    app: coffee-loyalty
spec:
  replicas: 1
  selector:
    matchLabels:
      app: coffee-loyalty
  template:
    metadata:
      labels:
        app: coffee-loyalty
    spec:
      containers:
        - name: app
          image: coffee-loyalty:1.0.0
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: "k8s"
            - name: KAFKA_BOOTSTRAP_SERVERS
              valueFrom:
                configMapKeyRef:
                  name: coffee-loyalty-config
                  key: kafka.bootstrap.servers
            - name: SPRING_DATASOURCE_URL
              valueFrom:
                secretKeyRef:
                  name: coffee-loyalty-db
                  key: url
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 15
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: coffee-loyalty
spec:
  selector:
    app: coffee-loyalty
  ports:
    - port: 80
      targetPort: 8080
  type: ClusterIP
