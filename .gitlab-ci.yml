stages:
  - build
  - test
  - package
  - deploy

variables:
  MAVEN_OPTS: "-Dmaven.repo.local=.m2/repository"
  DOCKER_IMAGE: $CI_REGISTRY_IMAGE:$CI_COMMIT_SHORT_SHA

build:
  stage: build
  image: eclipse-temurin:17
  script:
    - mvn -B compile -DskipTests
  cache:
    key: maven
    paths:
      - .m2/repository

test:
  stage: test
  image: eclipse-temurin:17
  script:
    - mvn -B test -DskipTests=false
  cache:
    key: maven
    paths:
      - .m2/repository

package:
  stage: package
  image: eclipse-temurin:17
  script:
    - mvn -B package -DskipTests
  artifacts:
    paths:
      - target/*.jar

docker:
  stage: package
  image: docker:24
  services:
    - docker:24-dind
  variables:
    DOCKER_TLS_CERTDIR: "/certs"
  script:
    - docker build -t $DOCKER_IMAGE .
    - docker push $DOCKER_IMAGE
  only:
    - main
    - master

deploy:
  stage: deploy
  image: alpine/k8s:1.27.2
  script:
    - kubectl set image deployment/coffee-loyalty app=$DOCKER_IMAGE --record
  only:
    - main
  when: manual
