spring:
  application:
    name: coffee-loyalty
  datasource:
    url: jdbc:h2:mem:loyalty;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.IntegerSerializer
      retries: 3
      acks: all

app:
  kafka:
    enabled: ${KAFKA_ENABLED:true}  # false — отключить Kafka (тесты, dev без Kafka)
    topic: point-transactions
    dlq-topic: point-transactions-dlq
  points-per-rub: 0.1

server:
  port: ${SERVER_PORT:8080}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      show-details: when_authorized
  health:
    livenessState:
      enabled: true
    readinessState:
      enabled: true
  metrics:
    export:
      prometheus:
        enabled: true

logging:
  level:
    root: INFO
    ru.coffee: DEBUG
